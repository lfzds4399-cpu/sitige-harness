name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,observability,scheduling,storage]"

      - name: Lint
        run: ruff check .

      - name: Type check (gradual — informational)
        # Strict typing is enforced only on modules listed under
        # [[tool.mypy.overrides]] in pyproject.toml. The rest of the codebase is
        # being annotated incrementally, so this step is non-fatal.
        run: mypy src --ignore-missing-imports || true
        continue-on-error: true

      - name: Security scan
        run: bandit -r src -ll

      - name: Tests
        run: pytest -q --cov=tetra_harness --cov-report=term-missing
