# Alembic configuration — sitige-harness storage migrations
#
# 用法 (在 harness/ 目录下):
#   alembic upgrade head                       # 应用所有迁移
#   alembic revision -m "msg" --autogenerate   # 自动生成迁移
#   alembic downgrade -1                       # 回滚一步
#   alembic current                            # 查看当前版本
#
# DB URL 来自环境变量 TETRA_DB_URL (默认 sqlite+aiosqlite:///data/tetra.db)
# env.py 用 async + 读 TETRA_DB_URL.

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
timezone = UTC

# 命名 / 模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# url 由 env.py 从 TETRA_DB_URL 读, 这里留空 (env.py 兜底默认值)
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
